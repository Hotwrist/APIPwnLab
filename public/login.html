<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APIPwnLab Login</title>

<style>

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:#1f1f2e;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:#eee;
}

.login-container{
background:#2b2b3a;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
text-align:center;
}

h2{
color:#00d1b2;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:none;
background:#1f1f2e;
color:#eee;
font-size:14px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#00d1b2;
color:#111;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00b89c;
}

.register{
margin-top:15px;
background:#44445a;
color:#eee;
}

.error{
color:#ff6b6b;
margin-top:10px;
}

</style>
</head>

<body>

<div class="login-container">

<h2>APIPwnLab Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<button class="register" onclick="goRegister()">Register</button>

<div id="error" class="error"></div>

</div>

<script>

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const res=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
})

const data=await res.json()

if(data.token){

localStorage.setItem("token",data.token)
localStorage.setItem("userId",data.userId)

window.location="labs.html"

}else{
document.getElementById("error").innerText="Invalid credentials"
}

}

function goRegister(){
window.location="register.html"
}

</script>

</body>
</html>
